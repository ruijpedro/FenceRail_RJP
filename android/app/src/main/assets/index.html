<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inspeção de Vedações</title>

<style>
body{
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  background:#eef3f8;
  color:#102033;
}

.header{
  background:linear-gradient(135deg,#003b73,#0069b4);
  color:white;
  padding:22px 18px;
  text-align:center;
  border-bottom-left-radius:28px;
  border-bottom-right-radius:28px;
}

.logo{
  font-size:34px;
  font-weight:900;
  letter-spacing:1px;
}

.title{
  font-size:22px;
  font-weight:800;
  margin-top:8px;
}

.subtitle{
  font-size:14px;
  opacity:.95;
  margin-top:4px;
}

.container{
  padding:18px;
}

.card{
  background:white;
  border-radius:18px;
  padding:18px;
  margin-bottom:16px;
  box-shadow:0 5px 14px rgba(0,0,0,.10);
}

.card h2{
  margin:0 0 14px 0;
  color:#003b73;
  font-size:20px;
}

label{
  font-weight:700;
  display:block;
  margin-top:12px;
  margin-bottom:6px;
}

input, select, textarea{
  width:100%;
  padding:12px;
  border:1px solid #c8d3df;
  border-radius:12px;
  font-size:15px;
  box-sizing:border-box;
}

textarea{
  min-height:90px;
}

button{
  width:100%;
  border:0;
  border-radius:14px;
  padding:15px;
  margin-top:12px;
  font-size:16px;
  font-weight:800;
  color:white;
  background:#005a9c;
}

button.secondary{
  background:#1b84c6;
}

button.green{
  background:#168039;
}

button.dark{
  background:#102033;
}

.status{
  padding:12px;
  border-radius:12px;
  text-align:center;
  font-weight:800;
  margin-top:10px;
}

.bom{background:#d8f5df;color:#166534;}
.razoavel{background:#fff3c4;color:#8a6200;}
.mau{background:#ffd8a8;color:#a34700;}
.critico{background:#ffc9c9;color:#8b0000;}

.small{
  font-size:13px;
  color:#607080;
  margin-top:8px;
}

.footer{
  text-align:center;
  font-size:12px;
  color:#607080;
  padding:18px;
}
</style>
</head>

<body>

<div class="header">
  <div class="logo">RJP</div>
  <div class="title">Inspeção de Vedações</div>
  <div class="subtitle">Inspeção e Cadastro de Vedações</div>
</div>

<div class="container">

  <div class="card">
    <h2>Identificação</h2>

    <label>Linha</label>
    <input id="linha" placeholder="Ex: Linha do Oeste">

    <label>Troço / Local</label>
    <input id="troco" placeholder="Ex: Meleças - Sabugo">

    <label>PK Inicial</label>
    <input id="pkIni" placeholder="Ex: 121+450">

    <label>PK Final</label>
    <input id="pkFim" placeholder="Ex: 121+700">

    <label>Lado da Via</label>
    <select id="lado">
      <option>Esquerdo</option>
      <option>Direito</option>
      <option>Ambos</option>
    </select>
  </div>

  <div class="card">
    <h2>Tipo de Vedação</h2>

    <label>Tipo segundo Norma</label>
    <select id="tipoNorma">
      <option>Vedação Plena Via Zona Urbana</option>
      <option>Vedação Plena Via Zona Rural</option>
      <option>Vedação em Estações e Apeadeiros</option>
      <option>Outro / Cadastro Existente</option>
    </select>

    <label>Tipologia</label>
    <select id="tipologia">
      <option>Urbana - Tipologia I</option>
      <option>Urbana - Tipologia II</option>
      <option>Rural - Rede 160/9/15</option>
      <option>Estações/Apeadeiros - Painel Electrossoldado</option>
      <option>Portão Rodoviário / Emergência</option>
      <option>Porta de Homem</option>
      <option>Tipo existente no Excel</option>
    </select>

    <label>Tipo existente no cadastro/Excel</label>
    <input id="tipoExcel" placeholder="Preencher se existir no cadastro antigo">
  </div>

  <div class="card">
    <h2>Estado de Conservação</h2>

    <label>Estado Geral</label>
    <select id="estado" onchange="atualizarEstado()">
      <option>Bom</option>
      <option>Razoável</option>
      <option>Mau</option>
      <option>Crítico</option>
    </select>

    <div id="estadoBox" class="status bom">Estado Bom</div>

    <label>Componentes afetados</label>
    <select id="componente">
      <option>Rede / Painel</option>
      <option>Postes</option>
      <option>Fundações / Murete</option>
      <option>Portão</option>
      <option>Ligação à Terra</option>
      <option>Vegetação</option>
      <option>Continuidade da Vedação</option>
      <option>Outro</option>
    </select>

    <label>Observações</label>
    <textarea id="obs" placeholder="Descrever anomalia, risco, condicionamentos e observações técnicas."></textarea>
  </div>

  <div class="card">
    <h2>Ação de Manutenção</h2>

    <label>Tipo de intervenção</label>
    <select id="acao">
      <option>Sem ação imediata</option>
      <option>Reparação</option>
      <option>Substituição</option>
      <option>Reforço</option>
      <option>Limpeza / Vegetação</option>
      <option>Reposição de Vedação</option>
      <option>Nova Vedação</option>
    </select>

    <label>Prioridade</label>
    <select id="prioridade">
      <option>Baixa</option>
      <option>Média</option>
      <option>Alta</option>
      <option>Urgente</option>
    </select>

    <label>Descrição da intervenção</label>
    <textarea id="descricaoAcao" placeholder="Ex: Repor rede danificada e substituir postes inclinados."></textarea>
  </div>

  <div class="card">
    <h2>GPS</h2>

    <button class="secondary" onclick="marcarGPS('inicio')">Marcar GPS Início</button>
    <div class="small" id="gpsInicio">GPS início: não registado</div>

    <button class="secondary" onclick="marcarGPS('fim')">Marcar GPS Fim</button>
    <div class="small" id="gpsFim">GPS fim: não registado</div>
  </div>

  <div class="card">
    <h2>Registo / Exportação</h2>

    <button class="green" onclick="guardarLocal()">Guardar inspeção na APP</button>
    <button onclick="gerarPDF()">Gerar PDF / Partilhar</button>
    <button class="dark" onclick="sincronizarSheets()">Adicionar à folha de cadastro</button>

    <div class="small" id="msg">Sem sincronização efetuada.</div>
  </div>

</div>

<div class="footer">
  RJP Rail Suite • FenceRail_RJP • Vedações
</div>

<script>
let gpsIni = "";
let gpsEnd = "";

function atualizarEstado(){
  const estado = document.getElementById("estado").value;
  const box = document.getElementById("estadoBox");
  box.className = "status";

  if(estado === "Bom") box.classList.add("bom");
  if(estado === "Razoável") box.classList.add("razoavel");
  if(estado === "Mau") box.classList.add("mau");
  if(estado === "Crítico") box.classList.add("critico");

  box.innerText = "Estado " + estado;
}

function marcarGPS(tipo){
  if(!navigator.geolocation){
    alert("GPS não disponível neste dispositivo.");
    return;
  }

  navigator.geolocation.getCurrentPosition(
    function(pos){
      const lat = pos.coords.latitude.toFixed(6);
      const lon = pos.coords.longitude.toFixed(6);
      const txt = lat + ", " + lon;

      if(tipo === "inicio"){
        gpsIni = txt;
        document.getElementById("gpsInicio").innerText = "GPS início: " + txt;
      }else{
        gpsEnd = txt;
        document.getElementById("gpsFim").innerText = "GPS fim: " + txt;
      }
    },
    function(){
      alert("Não foi possível obter a localização GPS.");
    },
    {enableHighAccuracy:true, timeout:10000}
  );
}

function recolherDados(){
  return {
    data: new Date().toLocaleString("pt-PT"),
    linha: document.getElementById("linha").value,
    troco: document.getElementById("troco").value,
    pkIni: document.getElementById("pkIni").value,
    pkFim: document.getElementById("pkFim").value,
    lado: document.getElementById("lado").value,
    tipoNorma: document.getElementById("tipoNorma").value,
    tipologia: document.getElementById("tipologia").value,
    tipoExcel: document.getElementById("tipoExcel").value,
    estado: document.getElementById("estado").value,
    componente: document.getElementById("componente").value,
    obs: document.getElementById("obs").value,
    acao: document.getElementById("acao").value,
    prioridade: document.getElementById("prioridade").value,
    descricaoAcao: document.getElementById("descricaoAcao").value,
    gpsInicio: gpsIni,
    gpsFim: gpsEnd
  };
}

function guardarLocal(){
  const dados = recolherDados();
  let lista = JSON.parse(localStorage.getItem("fencerail_inspecoes") || "[]");
  lista.push(dados);
  localStorage.setItem("fencerail_inspecoes", JSON.stringify(lista));
  document.getElementById("msg").innerText = "Inspeção guardada localmente.";
  alert("Inspeção guardada na APP.");
}

function gerarPDF(){
  const d = recolherDados();

  const html = `
  INSPEÇÃO DE VEDAÇÕES - FenceRail_RJP

  Data: ${d.data}
  Linha: ${d.linha}
  Troço: ${d.troco}
  PK: ${d.pkIni} a ${d.pkFim}
  Lado: ${d.lado}

  Tipo segundo Norma: ${d.tipoNorma}
  Tipologia: ${d.tipologia}
  Tipo cadastro/Excel: ${d.tipoExcel}

  Estado: ${d.estado}
  Componente afetado: ${d.componente}

  Observações:
  ${d.obs}

  Ação de manutenção:
  ${d.acao}
  Prioridade: ${d.prioridade}
  Descrição:
  ${d.descricaoAcao}

  GPS início: ${d.gpsInicio}
  GPS fim: ${d.gpsFim}
  `;

  const blob = new Blob([html], {type:"text/plain"});
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = "Inspecao_Vedacoes_FenceRail_RJP.txt";
  a.click();

  setTimeout(()=>URL.revokeObjectURL(url),1000);

  document.getElementById("msg").innerText =
    "Relatório gerado. No Android será evoluído para PDF nativo/partilha.";
}

function sincronizarSheets(){
  const dados = recolherDados();

  /*
    Aqui vamos colocar depois o URL do Google Apps Script:
    fetch("URL_DO_APPS_SCRIPT", {
      method:"POST",
      body: JSON.stringify(dados)
    })
  */

  console.log("Dados para Google Sheets:", dados);

  document.getElementById("msg").innerText =
    "Pronto para enviar para Google Sheets. Falta ligar o Apps Script.";
  alert("Na próxima fase ligamos ao Google Sheets/Drive.");
}
</script>

</body>
</html>
